# Frontend nginx - serve o SPA e faz proxy de /api para a API interna.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;  client_max_body_size 32m;

  # DNS interno do Docker. TTL curto p/ reagir a troca de IP da API.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # API -> container 'api' na mesma rede docker (porta 3000).
  # Usar regex c/ captura + proxy_pass via variavel forca o nginx a
  # re-resolver o DNS a cada request (evita congelar o IP no boot,
  # que era a causa do 502 Bad Gateway apos rebuild da API).
  location ~ ^/api/(.*)$ {
    set $api_upstream http://api:3000;
    proxy_pass $api_upstream/api/$1$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }

  # Paginas estaticas auxiliares (ja existem, fora do bundle React).
  location = /backup.html { add_header Cache-Control "no-store"; try_files /backup.html =404; }
  location = /conta.html { try_files /conta.html =404; }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
