<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AutoFlow — Conta</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--bd:#334155;--tx:#e2e8f0;--mut:#94a3b8;--ok:#22c55e;--bad:#ef4444;--warn:#f59e0b;--acc:#7c3aed}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif}
.wrap{max-width:640px;margin:0 auto;padding:28px 20px}
h1{font-size:22px;margin:0 0 4px}
.sub{color:var(--mut);margin:0 0 20px}
.back{color:var(--mut);text-decoration:none;font-size:13px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:22px;margin-top:18px}
label{display:block;font-size:13px;color:var(--mut);margin:12px 0 4px}
input[type=password]{width:100%;background:#0b1220;border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:9px 10px;font-size:14px}
button{background:var(--acc);color:#fff;border:0;padding:10px 18px;border-radius:10px;font-size:14px;cursor:pointer;margin-top:18px}
button:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:16px;padding:10px 12px;border-radius:8px;font-size:13px;display:none}
.msg.ok{display:block;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.4);color:#86efac}
.msg.err{display:block;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#fca5a5}
.hint{font-size:12px;color:var(--mut);margin-top:4px}
</style></head><body>
<div class="wrap">
<a class="back" href="/">← Voltar ao AutoFlow</a>
<h1>Minha Conta</h1>
<p class="sub">Altere a senha de acesso ao sistema.</p>
<div class="card">
<h2 style="margin:0 0 8px;font-size:17px">Trocar senha</h2>
<label>Senha atual</label>
<input type="password" id="cur" autocomplete="current-password">
<label>Nova senha</label>
<input type="password" id="nw" autocomplete="new-password">
<div class="hint">Mínimo de 6 caracteres.</div>
<label>Confirmar nova senha</label>
<input type="password" id="nw2" autocomplete="new-password">
<button id="btn" disabled>Salvar nova senha</button>
<div class="msg" id="msg"></div>
</div></div>
<script>
const TK=localStorage.getItem('token');
const $=id=>document.getElementById(id);
const msg=$('msg'),btn=$('btn');
function show(t,cls){msg.textContent=t;msg.className='msg '+cls;}
function validate(){
  const c=$('cur').value,n=$('nw').value,n2=$('nw2').value;
  let ok=c.length>0 && n.length>=6 && n===n2;
  btn.disabled=!ok;
  if(n2.length>0 && n!==n2){show('As senhas não coincidem.','err');}
  else if(n.length>0 && n.length<6){show('A nova senha deve ter ao menos 6 caracteres.','err');}
  else{msg.className='msg';}
}
['cur','nw','nw2'].forEach(id=>$(id).addEventListener('input',validate));
if(!TK){show('Você precisa estar logado. Volte ao sistema e faça login.','err');}
btn.addEventListener('click',async()=>{
  btn.disabled=true;show('Salvando...','');
  try{
    const r=await fetch('/api/auth/change-password',{method:'POST',headers:{Authorization:'Bearer '+TK,'Content-Type':'application/json'},body:JSON.stringify({currentPassword:$('cur').value,newPassword:$('nw').value})});
    const d=await r.json().catch(()=>({}));
    if(r.ok){show('Senha alterada com sucesso!','ok');$('cur').value=$('nw').value=$('nw2').value='';}
    else{show(d.message||d.error||('Erro '+r.status),'err');btn.disabled=false;}
  }catch(e){show('Falha de rede: '+e.message,'err');btn.disabled=false;}
});
</script></body></html>
