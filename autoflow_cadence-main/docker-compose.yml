# ════════════════════════════════════════════════════════════════════
# AutoFlow CADENCE — stack COMPLETO e INDEPENDENTE
# Não compartilha NADA com o 4025: banco, fila, gateway, sessão e dados
# são todos próprios. Deploy: Hostinger Compose URL  OU  git clone + compose.
# Containers/volumes com prefixo afcad_  ·  web na porta 4050.
# A senha/segredo têm padrão embutido — TROQUE depois do 1º login.
# ════════════════════════════════════════════════════════════════════
services:
  mongo:
    image: mongo:6
    container_name: afcad_mongo
    volumes: ["afcad_mongo:/data/db"]
    restart: unless-stopped
    networks: [afcad-net]
    healthcheck:
      test: ["CMD","mongosh","--quiet","--eval","db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: afcad_redis
    command: ["redis-server","--appendonly","yes"]
    volumes: ["afcad_redis:/data"]
    restart: unless-stopped
    networks: [afcad-net]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  wa-gateway:
    build: ./backend/wa-gateway
    container_name: afcad_gateway
    environment:
      - NODE_ENV=production
      - PORT=3333
      - WEBHOOK_URL=http://api:3000/api/internal/message
      - TZ=America/Sao_Paulo
    volumes: ["afcad_wa_auth:/app/auth", "afcad_media:/media"]   # SESSÃO PRÓPRIA + mídia/áudio
    restart: unless-stopped
    networks: [afcad-net]

  api:
    build: ./backend/api
    container_name: afcad_api
    volumes: ["afcad_backups:/backups", "afcad_media:/media"]
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URL=mongodb://mongo:27017/wa_admin
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-cadence-troque-este-segredo-por-32-chars-aleatorios}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@admin.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - WA_GATEWAY_URL=http://wa-gateway:3333
      - TZ=America/Sao_Paulo
      - NOTICE_7D=${NOTICE_7D:-Olá {{nome}}! Sua assinatura vence em 7 dias.}
      - NOTICE_1D=${NOTICE_1D:-Atenção {{nome}}! Sua assinatura vence amanhã.}
      - NOTICE_TODAY=${NOTICE_TODAY:-Olá {{nome}}! Sua assinatura expira hoje.}
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    networks: [afcad-net]

  worker:
    build: ./backend/worker
    container_name: afcad_worker
    environment:
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongo:27017/wa_admin
      - REDIS_HOST=redis
      - WA_GATEWAY_URL=http://wa-gateway:3333
      - MIN_MESSAGE_DELAY_MS=${MIN_MESSAGE_DELAY_MS:-2000}
      - JITTER_MS=${JITTER_MS:-1000}
      - TZ=America/Sao_Paulo
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    networks: [afcad-net]

  web:
    build: ./web                 # SPA Cadence + nginx (proxy /api -> api:3000)
    container_name: afcad_web
    ports: ["4050:80"]
    depends_on: [api]
    restart: unless-stopped
    networks: [afcad-net]

networks:
  afcad-net:
    driver: bridge

volumes:
  afcad_mongo:
  afcad_redis:
  afcad_wa_auth:
  afcad_backups:
  afcad_media:
